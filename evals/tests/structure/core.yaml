- description: "[chain] quarterly metrics story — five slides qualitative trends"
  vars:
    stage: outline_then_structure
    layout_json: file://schemas/layouts/standard.json
    layout_catalog_size: 11
    content: >
      Five-slide quarterly metrics readout for product and data leaders: funnel story with qualitative up/down/flat
      language only unless repeating a number from this prompt, cohort retention themes without invented percentages,
      experiment A/B narrative, data quality caveats, segment contrast SMB vs enterprise without fake statistics, and
      three decision bullets for next quarter. Each slide needs ## title; do not add markdown pipe tables anywhere.
    n_slides: 5
    language: English
    tone: professional
    verbosity: standard
    instructions: "Name each slide by metric theme; no fabricated percentages."
    additional_context: "Internal quarterly review."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    structure_instructions: "No markdown tables in the outline: avoid choosing layouts whose primary schema field is a large table_md unless a slide truly contains a pipe table."
  assert:
    - type: javascript
      value: |
        const r = typeof output === 'string' ? JSON.parse(output) : output;
        const s = r.structure && r.structure.slides;
        const n = Number("{{layout_catalog_size}}");
        if (!Array.isArray(s) || s.length !== 5) return false;
        if (!s.every(i => Number.isInteger(i) && i >= 0 && i < n)) return false;
        return new Set(s).size >= 2;
    - type: llm-rubric
      threshold: 0.63
      value: >
        Qualitative metrics story without tables. Score 1 if layouts match bullet-heavy analytical slides and avoid table-first layouts for slides that have no pipe table.
        Score 0 if table-style layouts dominate despite no tables in the outline text.

- description: "[chain] opening title then deep dive — four slides concise"
  vars:
    stage: outline_then_structure
    layout_json: file://schemas/layouts/standard.json
    layout_catalog_size: 11
    content: >
      Four-slide outline for a city transit workshop: opening title promise, benefits for riders and air quality in
      bullets, charging and grid impacts in bullets with one short caution note, and policy levers plus one ask for
      council. Use ## headings; slides 2–4 need at least four bullets each; slide 1 should be a short hero-style opener
      under twelve lines total. No images or URLs; no markdown tables.
    n_slides: 4
    language: English
    tone: professional
    verbosity: concise
    instructions: "Slide 1 must stay short; slides 2–4 carry detail."
    additional_context: "Workshop for agency staff."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    structure_instructions: "Slide 1 is a short opener: prefer a title-forward layout; later slides should use layouts that support multiple bullets."
  assert:
    - type: javascript
      value: |
        const r = typeof output === 'string' ? JSON.parse(output) : output;
        const s = r.structure && r.structure.slides;
        const n = Number("{{layout_catalog_size}}");
        return Array.isArray(s) && s.length === 4 &&
          s.every(i => Number.isInteger(i) && i >= 0 && i < n);
    - type: llm-rubric
      threshold: 0.64
      value: >
        Slide 1 opener vs deeper bullet slides. Score 1 if first layout fits a concise title/opening and later indices fit denser bullet content.
        Score 0 if slide 1 gets a heavy multi-column layout clearly meant for long lists or all four slides use the same index without justification.
