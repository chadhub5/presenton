# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Two-stage layout eval: stage `outline_then_structure` (see evals/provider.py).
# 1) LLM generates outline from the same vars as outline-only tests.
# 2) LLM picks one layout index per slide using prompts/structure_system.txt + real catalog
#    file://schemas/layouts/standard.json (see schemas/layouts/standard.meta.json).
#
# Output shape: { "outline": { "slides": [...] }, "structure": { "slides": [int, ...] } }
#
# Shared vars for catalog bounds (assertions / rubrics):
#   layout_catalog_size: 11          # must match standard.meta.json num_layouts
#   toc_layout_index: 9               # standard:table-of-contents-layout
#
# Optional:
#   structure_instructions: string   # passed to structure stage only (layout choice). If omitted, provider default applies.
#
# Outline vars: same contract as tests/outline/core.yaml (content, n_slides, tone, verbosity, …).
#
# --- Catalog validity + shape ---
- description: "[chain] four-slide B2B product arc — indices in range"
  vars:
    stage: outline_then_structure
    layout_json: file://schemas/layouts/standard.json
    layout_catalog_size: 11
    content: >
      Create a four-slide outline for a B2B analytics product update for directors of engineering: slide 1 opening
      and promise of faster incident insight; slide 2 problem with fragmented logs and alert fatigue; slide 3 product
      approach with three bullets on correlation and runbooks; slide 4 proof with two anonymized customer outcomes and
      a clear ask for a pilot workshop. Each slide must use markdown with a ## title and substantive bullets or short
      paragraphs (no filler). Audience is technical but time-constrained.
    n_slides: 4
    language: English
    tone: professional
    verbosity: standard
    instructions: "Keep each slide focused on one chapter; no tables required."
    additional_context: ""
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    structure_instructions: >
      Pick one layout index per slide from the standard catalog. Match narrative vs proof vs CTA; prefer variety when
      multiple layouts fit. Do not use the table-of-contents layout unless a slide is explicitly a TOC.
  assert:
    - type: javascript
      value: |
        const r = typeof output === 'string' ? JSON.parse(output) : output;
        const s = r.structure && r.structure.slides;
        const n = Number("{{layout_catalog_size}}");
        return Array.isArray(s) && s.length === 4 &&
          s.every(i => Number.isInteger(i) && i >= 0 && i < n);
    - type: llm-rubric
      threshold: 0.65
      value: >
        Catalog has {{layout_catalog_size}} layouts (indices 0..{{layout_catalog_size}}-1). Outline was generated then structure indices chosen.
        Score 1 if each index plausibly matches that slide's role (intro / problem / product / proof+ask) and no index is out of range.
        Score 0 if indices are random, identical for every slide despite varied content, or incompatible with slide text.

- description: "[chain] five-slide marketing launch — some layout variety"
  vars:
    stage: outline_then_structure
    layout_json: file://schemas/layouts/standard.json
    layout_catalog_size: 11
    content: >
      Five-slide consumer launch outline for a plant-based yogurt: audience tension, positioning line, three proof
      points (taste test, nutrition, sustainability), omnichannel plan with retail and social, and closing KPIs plus
      CTA. Use clear ## headings and bullets; avoid markdown tables on slides 1–3; you may use a small comparison table
      on slide 4 only if it helps the channel plan. Tone should stay persuasive and concrete.
    n_slides: 5
    language: English
    tone: sales_pitch
    verbosity: standard
    instructions: "Slide 5 must end with measurable KPIs and one CTA sentence."
    additional_context: "Agency review deck."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    structure_instructions: "Prefer at least two different layout indices across the deck when content allows; match denser slides to layouts that support bullets or cards."
  assert:
    - type: javascript
      value: |
        const r = typeof output === 'string' ? JSON.parse(output) : output;
        const s = r.structure && r.structure.slides;
        const n = Number("{{layout_catalog_size}}");
        if (!Array.isArray(s) || s.length !== 5) return false;
        if (!s.every(i => Number.isInteger(i) && i >= 0 && i < n)) return false;
        return new Set(s).size >= 2;
    - type: llm-rubric
      threshold: 0.65
      value: >
        Five-slide launch arc. Score 1 if layout choices show variety (not five copies of the same index without reason)
        and CTA/KPI slide uses a layout that supports lists or metrics. Score 0 if all indices are identical or clearly wrong for the slide bodies.

- description: "[chain] six-slide internal roadmap — stronger variety bar"
  vars:
    stage: outline_then_structure
    layout_json: file://schemas/layouts/standard.json
    layout_catalog_size: 11
    content: >
      Six-slide internal roadmap for a platform team: vision and north star, current pillars, top customer pains with
      one example each, engineering bets for the next two quarters, GTM calendar milestones, and risks with mitigations.
      Each slide needs a ## title and at least four substantive bullet lines. No images or URLs; no markdown tables on
      slides 1 or 6; optional small table only on slide 4 for milestone dates. Audience: engineering and product leaders.
    n_slides: 6
    language: English
    tone: professional
    verbosity: text-heavy
    instructions: "Keep slide 6 to risks and mitigations only; do not introduce new product pillars on slide 6."
    additional_context: ""
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    structure_instructions: "Strongly prefer at least three distinct layout indices across the six slides when multiple layouts fit the markdown."
  assert:
    - type: javascript
      value: |
        const r = typeof output === 'string' ? JSON.parse(output) : output;
        const s = r.structure && r.structure.slides;
        const n = Number("{{layout_catalog_size}}");
        if (!Array.isArray(s) || s.length !== 6) return false;
        if (!s.every(i => Number.isInteger(i) && i >= 0 && i < n)) return false;
        return new Set(s).size >= 3;
    - type: llm-rubric
      threshold: 0.62
      value: >
        Six-slide roadmap with varied slide types. Score 1 if layout indices are not almost all the same and each choice is defensible from the outline text.
        Score 0 if five or six slides share one index without clear reason or choices ignore obvious table vs non-table cues.

