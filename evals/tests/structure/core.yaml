      Tres diapositivas para un informe breve de politica de movilidad urbana en castellano: contexto regional,
      retos de inversion y ultima milla, y recomendaciones concretas para ayuntamientos. Cada diapositiva debe tener un
      titulo en markdown con ## y varios bullets sustantivos (minimo cuatro lineas de contenido por diapositiva). Sin
      tablas markdown obligatorias; tono profesional y claro para no especialistas.
    n_slides: 3
    language: Spanish
    tone: professional
    verbosity: standard
    instructions: "Mantener el espanol en todas las diapositivas."
    additional_context: ""
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    structure_instructions: "Selecciona indices de layout adecuados al contenido en espanol; respeta el tamano del catalogo."
  assert:
    - type: javascript
      value: |
        const r = typeof output === 'string' ? JSON.parse(output) : output;
        const s = r.structure && r.structure.slides;
        const n = Number("{{layout_catalog_size}}");
        return Array.isArray(s) && s.length === 3 &&
          s.every(i => Number.isInteger(i) && i >= 0 && i < n);
    - type: llm-rubric
      threshold: 0.64
      value: >
        Spanish policy outline then layout indices. Score 1 if choices fit headings and bullet-heavy policy text. Score 0 if picks are random or ignore language/content cues.

- description: "[chain] educational photosynthesis — five slides"
  vars:
    stage: outline_then_structure
    layout_json: file://schemas/layouts/standard.json
    layout_catalog_size: 11
    content: >
      Five-slide middle-school lesson outline on photosynthesis: what it is, why leaves look green, inputs and outputs
      with a simple word equation, one real greenhouse or farm example, and a recap slide with five short review
      questions only. Use ## titles and kid-friendly definitions in one short phrase for any technical term. No images
      required; optional one small markdown table on slide 4 comparing sunlight vs artificial light for growth if it
      helps clarity.
    n_slides: 5
    language: English
    tone: educational
    verbosity: standard
    instructions: "Slide 5 must be recap and questions only; no new core concepts on slide 5."
    additional_context: "Audience about 12 years old."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    structure_instructions: "Choose layouts that support teaching progression (concept slides vs example vs recap/questions); avoid TOC layout."
  assert:
    - type: javascript
      value: |
        const r = typeof output === 'string' ? JSON.parse(output) : output;
        const s = r.structure && r.structure.slides;
        const n = Number("{{layout_catalog_size}}");
        return Array.isArray(s) && s.length === 5 &&
          s.every(i => Number.isInteger(i) && i >= 0 && i < n);
    - type: llm-rubric
      threshold: 0.64
      value: >
        Educational arc for young teens. Score 1 if layout indices differ sensibly across lesson vs example vs recap and avoid obviously wrong image-only picks for text-only slides.
        Score 0 if all slides use one index or recap/questions slide uses a layout ill-suited to Q&A lists.

- description: "[chain] single TOC-only slide — prefer dedicated TOC layout"
  vars:
    stage: outline_then_structure
    layout_json: file://schemas/layouts/standard.json
    layout_catalog_size: 11
    toc_layout_index: 9
    content: >
      One slide only: a board-ready table of contents for a 45-minute QBR. The slide must list exactly these sections
      in order as bullets: Executive summary, Financial highlights, Operational milestones, Customer segment narrative,
      Risks and mitigations, and Decision asks. Use a clear ## title such as Agenda or Table of contents. Write at least
      twelve lines of substantive bullet text across the sections (no lorem ipsum). No numeric tables, no images, no
      URLs.
    n_slides: 1
    language: English
    tone: professional
    verbosity: concise
    instructions: "This deck has only this TOC slide; keep everything on one slide."
    additional_context: "Quarterly business review for leadership."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    structure_instructions: >
      The outline is a single table-of-contents slide listing sections. You MUST choose layout index 9 (the dedicated
      table-of-contents layout in this catalog) for slide 1.
  assert:
    - type: javascript
      value: |
        const r = typeof output === 'string' ? JSON.parse(output) : output;
        const s = r.structure && r.structure.slides;
        const n = Number("{{layout_catalog_size}}");
        const toc = Number("{{toc_layout_index}}");
        return Array.isArray(s) && s.length === 1 &&
          Number.isInteger(s[0]) && s[0] >= 0 && s[0] < n;
    - type: llm-rubric
      threshold: 0.72
      value: >
        Single-slide outline is a table of contents. Catalog TOC layout index is {{toc_layout_index}}.
        Score 1 if the chosen index is 9 or another clearly TOC-appropriate choice from the catalog. Score 0 if a non-TOC layout is chosen for a pure agenda slide.

- description: "[chain] numeric table on slide four — chart-capable layout on that slide"
  vars:
    stage: outline_then_structure
    layout_json: file://schemas/layouts/standard.json
    layout_catalog_size: 11
    content: >
      Four-slide executive metrics storyline in English: slide 1 context without numbers; slide 2 funnel narrative
      without invented percentages; slide 3 qualitative retention story; slide 4 MUST include a markdown pipe table with
      numeric cells only for these rows: Region, ARR in USD millions, YoY percent — with NA 42 and 18%, EU 31 and 12%,
      APAC 27 and 9%. Slides 1–3 must not contain markdown pipe tables. Each slide needs ## title and dense bullets
      except the table block on slide 4.
    n_slides: 4
    language: English
    tone: professional
    verbosity: standard
    instructions: "Do not add other numeric tables besides the one specified on slide 4."
    additional_context: "Outline feeds layout picker; table is only on slide 4."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    structure_instructions: >
      Slide 4 contains a numeric markdown table: prefer a chart-capable layout (indices 0 or 10 in this catalog) for
      that slide. Slides without tables should not pick layouts whose primary affordance is a large numeric chart if a
      simpler text layout fits better.
  assert:
    - type: javascript
      value: |
        const r = typeof output === 'string' ? JSON.parse(output) : output;
        const s = r.structure && r.structure.slides;
        const n = Number("{{layout_catalog_size}}");
        if (!Array.isArray(s) || s.length !== 4) return false;
        if (!s.every(i => Number.isInteger(i) && i >= 0 && i < n)) return false;
        const last = s[3];
        return last === 0 || last === 10;
    - type: llm-rubric
      threshold: 0.62
      value: >
        Slide 4 should carry a numeric markdown table; catalog favors chart-style layouts at indices 0 and 10.
        Score 1 if slide 4 index is 0 or 10 or another clearly chart-oriented choice. Score 0 if slide 4 uses a text-only layout that cannot host the table/chart affordance.

