      prose (no tables). Use ## headings; slides 1–3 and 5 must not pretend to be photo grids. No markdown tables.
    n_slides: 5
    language: English
    tone: sales_pitch
    verbosity: concise
    instructions: "Order: hook, problem, solution+traction on one slide, team roster on slide 4, fundraise ask only on slide 5."
    additional_context: "Investor pitch."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    structure_instructions: "Slide 4 is a team roster: prefer a team- or cards-friendly layout index from the catalog (e.g. layout with team cards in name/description). Slide 5 should support a short ask and bullets."
  assert:
    - type: javascript
      value: |
        const r = typeof output === 'string' ? JSON.parse(output) : output;
        const s = r.structure && r.structure.slides;
        const n = Number("{{layout_catalog_size}}");
        return Array.isArray(s) && s.length === 5 &&
          s.every(i => Number.isInteger(i) && i >= 0 && i < n);
    - type: llm-rubric
      threshold: 0.65
      value: >
        Slide 4 should present multiple people/roles. Score 1 if layout index on slide 4 fits a team/cards pattern from the catalog and slide 5 fits a CTA slide.
        Score 0 if team slide uses an unrelated single-hero layout or all slides share one index without reason.

