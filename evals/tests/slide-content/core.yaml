# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Chained deck eval: stage `outline_then_structure_then_slide_content` (evals/provider.py).
# Runs outline → structure (layout index per slide) → slide content.
# Slide content **depends on structure**: each slide is filled against the JSON schema of the layout chosen
# for that slide in the structure step (same as production presentation.py).
#
# Assertions and llm-rubrics MUST use `rendered_slide_bodies` only for quality — final slide dicts
# (headline, body_markdown, table_md, __speaker_note__, …). Ignore outline/structure in rubric text.
#
# Required vars: same outline contract as tests/outline/core.yaml, plus `layout_json` (use `standard.json`).

- description: "[slides] metrics fidelity — final slide bodies only"
  vars:
    stage: outline_then_structure_then_slide_content
    content: >
      Executive climate risk update. Use only these facts: CO2 421 ppm,
      warming 1.45C in 2023, clean energy investment USD 1.7T, solar additions
      413 GW (+87%). Present risk first then investment response.
    n_slides: 5
    language: English
    tone: professional
    verbosity: standard
    instructions: "Exactly 5 slides, investor-ready flow."
    additional_context: ""
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    layout_json: file://schemas/layouts/standard.json
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const bodies = o.rendered_slide_bodies;
        if (!Array.isArray(bodies) || bodies.length !== 5) return false;
        return o.outline?.slides?.length === 5 &&
               o.structure?.slides?.length === 5 &&
               Array.isArray(o.slides) && o.slides.length === 5;
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const bodies = o.rendered_slide_bodies || [];
        if (bodies.length !== 5) return false;
        return bodies.every(c => c && typeof c.__speaker_note__ === 'string' && c.__speaker_note__.length >= 40);
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const t = JSON.stringify(o.rendered_slide_bodies || []);
        return /421/.test(t) && /1\.45/.test(t) && /1\.7/.test(t) && /413/.test(t);
    - type: llm-rubric
      threshold: 0.72
      value: >
        The model output JSON includes `rendered_slide_bodies`: an array of the final structured
        slide objects shown to users (headline, body_markdown, table_md, __speaker_note__, etc.).
        Grade ONLY that array. Completely ignore `outline` and `structure` for scoring.
        Source briefing the user provided (allowed numbers only): {{content}}
        Score 1 if every quantitative claim in rendered_slide_bodies is limited to 421 ppm,
        1.45C (or equivalent wording), USD 1.7T clean energy investment, and 413 GW (+87%) solar,
        with no extra invented statistics, percentages, or currency amounts.
        Score 0 if any other numbers appear in those slide bodies or if key allowed facts are missing.

- description: "[slides] qualitative brief — no invented money in final slides"
  vars:
    stage: outline_then_structure_then_slide_content
    content: >
      Quarterly operations narrative: better warehouse accuracy, wider carrier coverage,
      improved customer delivery communication, and lower packaging waste.
      No quantitative financial disclosure allowed.
    n_slides: 4
    language: English
    tone: professional
    verbosity: standard
    instructions: "Keep all claims qualitative."
    additional_context: ""
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    layout_json: file://schemas/layouts/standard.json
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const bodies = o.rendered_slide_bodies;
        if (!Array.isArray(bodies) || bodies.length !== 4) return false;
        const text = JSON.stringify(bodies);
        return !/(\$|€|£|\d+\s*(million|billion|trillion))/i.test(text);
    - type: llm-rubric
      threshold: 0.72
      value: >
        Use only the `rendered_slide_bodies` array from the JSON output. Ignore outline and structure.
        User briefing: {{content}} Instructions: {{instructions}}
        Score 1 if all final slide text stays qualitative (no invented revenue, margins, headcount,
        percentages, or currency) while reflecting the operational themes.
        Score 0 if any slide body adds specific financial or numeric claims not in the briefing.

- description: "[slides] Spanish — final slide copy in Spanish"
  vars:
    stage: outline_then_structure_then_slide_content
    content: >
      Presentacion sobre movilidad urbana en America Latina para alcaldias:
      micromovilidad, brechas de inversion en transporte publico, retos de ultima milla,
      y recomendaciones de politica.
    n_slides: 4
    language: Spanish
    tone: educational
    verbosity: standard
    instructions: "Todo en espanol."
    additional_context: ""
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
    layout_json: file://schemas/layouts/standard.json
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const bodies = o.rendered_slide_bodies;
        if (!Array.isArray(bodies) || bodies.length !== 4) return false;
        const text = JSON.stringify(bodies).toLowerCase();
        const tokens = [' de ', ' la ', ' en ', ' para ', ' movilidad '];
        return tokens.filter(t => text.includes(t)).length >= 4;
    - type: llm-rubric
      threshold: 0.7
      value: >
        Evaluate ONLY `rendered_slide_bodies` from the output JSON (final slide fields). Ignore outline/structure.
        User request: {{content}} Instructions: {{instructions}}
        Score 1 if headlines and body copy in those objects are predominantly Spanish and on-topic for urban mobility in Latin America.
        Score 0 if English dominates the slide bodies or the topic drifts.
